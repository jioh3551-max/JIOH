<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>온라인 계약서 / AS 접수</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f6f7fb;
      color: #222;
    }
    .wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 24px 16px 60px;
    }
    .hero {
      background: #fff;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
      margin-bottom: 20px;
    }
    h1 { margin: 0 0 10px; font-size: 28px; }
    p { line-height: 1.6; }
    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 20px 0;
    }
    .tab-btn {
      border: 0;
      border-radius: 14px;
      padding: 14px;
      font-size: 16px;
      font-weight: bold;
      background: #e9edf7;
      cursor: pointer;
    }
    .tab-btn.active {
      background: #111827;
      color: #fff;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 22px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    }
    .hidden { display: none; }
    .section-title {
      margin: 0 0 16px;
      font-size: 22px;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .full { grid-column: 1 / -1; }
    label {
      display: block;
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 6px;
    }
    input, select, textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d0d7e2;
      border-radius: 12px;
      font-size: 15px;
      background: #fff;
    }
    textarea { min-height: 110px; resize: vertical; }
    .agree-box {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      padding: 12px;
      border: 1px solid #d0d7e2;
      border-radius: 12px;
      background: #fafbff;
    }
    .agree-box input { width: auto; margin-top: 3px; }
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }
    button.primary, button.secondary {
      border: 0;
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }
    button.primary { background: #111827; color: #fff; }
    button.secondary { background: #eef2ff; color: #111827; }
    .note {
      margin-top: 16px;
      padding: 14px;
      border-radius: 12px;
      background: #f8fafc;
      font-size: 14px;
      color: #475569;
    }
    .result {
      margin-top: 20px;
      padding: 16px;
      border-radius: 12px;
      background: #ecfdf5;
      border: 1px solid #a7f3d0;
      display: none;
      white-space: pre-line;
    }
    .qr-box {
      margin-top: 16px;
      text-align: center;
      background: #fff;
      border: 1px dashed #cbd5e1;
      border-radius: 16px;
      padding: 16px;
    }
    .qr-box img {
      max-width: 180px;
      width: 100%;
      height: auto;
    }
    @media (max-width: 720px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>온라인 계약서 / AS 접수 페이지</h1>
      <p>
        휴대폰 링크나 QR코드로 바로 열 수 있게 만든 샘플 페이지입니다.<br>
        계약서 작성과 AS 접수를 한 페이지에서 분리해서 받을 수 있도록 구성했습니다.
      </p>
      <div class="note">
        실제 사용 시에는 제출 버튼을 구글시트, 이메일, 노션, Firebase, Supabase 같은 저장 방식과 연결하면 됩니다.
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="contract">온라인 계약서</button>
      <button class="tab-btn" data-tab="as">AS 접수</button>
    </div>

    <div id="contract" class="card tab-panel">
      <h2 class="section-title">온라인 계약서 작성</h2>
      <form id="contractForm">
        <div class="grid">
          <div>
            <label>고객명</label>
            <input type="text" name="name" required />
          </div>
          <div>
            <label>연락처</label>
            <input type="tel" name="phone" placeholder="010-0000-0000" required />
          </div>
          <div class="full">
            <label>시공 주소</label>
            <input type="text" name="address" required />
          </div>
          <div>
            <label>제품명</label>
            <input type="text" name="product" placeholder="예: 스킨퓨어 1200" required />
          </div>
          <div>
            <label>색상</label>
            <input type="text" name="color" placeholder="예: 아이보리" />
          </div>
          <div>
            <label>시공 공간</label>
            <input type="text" name="space" placeholder="예: 거실, 복도, 작은방" />
          </div>
          <div>
            <label>희망 시공일</label>
            <input type="date" name="date" />
          </div>
          <div>
            <label>총 금액</label>
            <input type="text" name="price" placeholder="예: 2,350,000원" />
          </div>
          <div>
            <label>계약금</label>
            <input type="text" name="deposit" placeholder="예: 300,000원" />
          </div>
          <div class="full">
            <label>특약 / 안내사항</label>
            <textarea name="memo" placeholder="예: 냉장고 앞 미시공, 가구 반입 후 시공, 팬트리 문간섭 확인 필요"></textarea>
          </div>
          <div class="full">
            <label>전자서명</label>
            <input type="text" name="signature" placeholder="성함 입력으로 서명 대체" required />
          </div>
          <div class="full">
            <div class="agree-box">
              <input type="checkbox" name="agree" required />
              <div>위 계약 내용 및 개인정보 수집·이용 안내를 확인하였으며, 이에 동의합니다.</div>
            </div>
          </div>
        </div>
        <div class="actions">
          <button type="submit" class="primary">계약서 제출</button>
          <button type="button" class="secondary" onclick="makeQr('contract')">계약서 QR 보기</button>
        </div>
      </form>
      <div id="contractResult" class="result"></div>
      <div id="contractQr" class="qr-box hidden"></div>
    </div>

    <div id="as" class="card tab-panel hidden">
      <h2 class="section-title">AS 접수</h2>
      <form id="asForm">
        <div class="grid">
          <div>
            <label>고객명</label>
            <input type="text" name="name" required />
          </div>
          <div>
            <label>연락처</label>
            <input type="tel" name="phone" required />
          </div>
          <div class="full">
            <label>시공 주소</label>
            <input type="text" name="address" required />
          </div>
          <div>
            <label>시공일</label>
            <input type="date" name="installDate" />
          </div>
          <div>
            <label>구매 제품</label>
            <input type="text" name="product" placeholder="예: 프리미엄 1200" />
          </div>
          <div>
            <label>AS 유형</label>
            <select name="type">
              <option value="들뜸">들뜸</option>
              <option value="벌어짐">벌어짐</option>
              <option value="눌림">눌림</option>
              <option value="오염">오염</option>
              <option value="기타">기타</option>
            </select>
          </div>
          <div>
            <label>희망 연락 시간</label>
            <input type="text" name="contactTime" placeholder="예: 평일 오후 2시 이후" />
          </div>
          <div class="full">
            <label>상세 내용</label>
            <textarea name="detail" placeholder="문제가 발생한 위치와 증상을 자세히 적어주세요."></textarea>
          </div>
          <div class="full">
            <label>사진 링크</label>
            <input type="url" name="photo" placeholder="예: 네이버 MYBOX / 구글드라이브 공유링크" />
          </div>
          <div class="full">
            <div class="agree-box">
              <input type="checkbox" name="agree" required />
              <div>AS 접수 및 상담을 위한 개인정보 수집·이용에 동의합니다.</div>
            </div>
          </div>
        </div>
        <div class="actions">
          <button type="submit" class="primary">AS 접수하기</button>
          <button type="button" class="secondary" onclick="makeQr('as')">AS QR 보기</button>
        </div>
      </form>
      <div id="asResult" class="result"></div>
      <div id="asQr" class="qr-box hidden"></div>
    </div>
  </div>

  <script>
    const tabButtons = document.querySelectorAll('.tab-btn');
    const panels = document.querySelectorAll('.tab-panel');

    tabButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        const target = btn.dataset.tab;
        tabButtons.forEach(b => b.classList.remove('active'));
        panels.forEach(p => p.classList.add('hidden'));
        btn.classList.add('active');
        document.getElementById(target).classList.remove('hidden');
      });
    });

    document.getElementById('contractForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const data = new FormData(this);
      const name = data.get('name');
      const phone = data.get('phone');
      const product = data.get('product');
      const date = data.get('date') || '미정';
      const signature = data.get('signature');

      const result = document.getElementById('contractResult');
      result.style.display = 'block';
      result.textContent = `계약서가 접수되었습니다.\n\n고객명: ${name}\n연락처: ${phone}\n제품: ${product}\n희망 시공일: ${date}\n전자서명: ${signature}\n\n※ 현재는 샘플 화면입니다. 실제 저장 연결이 필요합니다.`;
      this.reset();
    });

    document.getElementById('asForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const data = new FormData(this);
      const name = data.get('name');
      const type = data.get('type');
      const phone = data.get('phone');

      const result = document.getElementById('asResult');
      result.style.display = 'block';
      result.textContent = `AS 접수가 완료되었습니다.\n\n고객명: ${name}\n연락처: ${phone}\n접수 유형: ${type}\n\n확인 후 순차적으로 연락드릴 예정입니다.\n※ 현재는 샘플 화면입니다. 실제 저장 연결이 필요합니다.`;
      this.reset();
    });

    function makeQr(type) {
      const currentUrl = window.location.origin + window.location.pathname + '#' + type;
      const qrUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=' + encodeURIComponent(currentUrl);
      const box = document.getElementById(type + 'Qr');
      box.classList.remove('hidden');
      box.innerHTML = `
        <p><strong>${type === 'contract' ? '계약서' : 'AS 접수'} QR코드</strong></p>
        <img src="${qrUrl}" alt="QR Code" />
        <p style="font-size:13px; color:#64748b; word-break:break-all;">${currentUrl}</p>
      `;
    }

    window.addEventListener('load', () => {
      if (location.hash === '#as') {
        document.querySelector('[data-tab="as"]').click();
      }
    });
  </script>
</body>
</html>
